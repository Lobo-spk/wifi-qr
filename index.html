<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>WiFi - Globo_Guest</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',Tahoma,sans-serif;
    background:linear-gradient(160deg,#1a237e 0%,#4a148c 100%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .card{
    background:#fff;border-radius:28px;padding:32px 24px 28px;
    max-width:380px;width:100%;text-align:center;
    box-shadow:0 24px 64px rgba(0,0,0,0.35);
  }
  .badge{
    display:inline-block;background:linear-gradient(135deg,#1a237e,#4a148c);
    color:#fff;font-size:.75rem;font-weight:700;letter-spacing:1.5px;
    text-transform:uppercase;border-radius:20px;padding:5px 14px;margin-bottom:18px;
  }
  h1{font-size:1.6rem;color:#1a237e;font-weight:800;margin-bottom:4px}
  .sub{font-size:.95rem;color:#888;margin-bottom:22px}
  .qr-wrap{
    display:inline-block;padding:14px;border:3px solid #ede7f6;
    border-radius:20px;background:#f9f6ff;margin-bottom:22px;
  }
  .qr-wrap img{width:220px;height:220px;display:block}
  .pw-box{
    background:#f3f0ff;border:2px solid #d1c4e9;border-radius:16px;
    padding:16px 20px;margin-bottom:22px;cursor:pointer;
  }
  .pw-label{font-size:.78rem;color:#9575cd;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .pw-value{font-size:2.2rem;font-weight:800;color:#4a148c;letter-spacing:5px;user-select:all}
  .pw-hint{font-size:.72rem;color:#b39ddb;margin-top:6px}
  .note{font-size:.72rem;color:#ccc}
  .toast{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:#4a148c;color:#fff;padding:12px 28px;border-radius:12px;
    font-size:1rem;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;
  }
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="card">
  <div class="badge">📶 GUEST WI-FI</div>
  <h1>Globo_Guest</h1>
  <p class="sub">Daily Password</p>

  <div class="qr-wrap">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=WIFI%3AT%3AWPA%3BS%3AGlobo_Guest%3BP%3A34582433%3B%3B" alt="WiFi QR Code">
  </div>

  <div class="pw-box" onclick="copyPW()">
    <div class="pw-label">🔑 Password</div>
    <div class="pw-value" id="pw">34582433</div>
    <div class="pw-hint">Click to copy the password</div>
  </div>

  <p class="note">🔄 The password changes automatically every day. (13/07/2026)</p>
</div>

<div class="toast" id="toast">✅ Copy แล้ว!</div>

<script>
function copyPW(){
  const pw=document.getElementById('pw').textContent.trim();
  const toast=document.getElementById('toast');
  const show=()=>{toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1500)};
  if(navigator.clipboard){navigator.clipboard.writeText(pw).then(show).catch(fb)}else{fb()}
  function fb(){
    const el=document.createElement('textarea');
    el.value=pw;el.style.position='fixed';el.style.opacity='0';
    document.body.appendChild(el);el.select();
    document.execCommand('copy');document.body.removeChild(el);show();
  }
}
</script>
</body>
</html>
